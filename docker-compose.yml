services:
  mariadb:
    image: mariadb:11.4
    container_name: family-recipes-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_local_dev
      MARIADB_DATABASE: family_recipes
      MARIADB_USER: family_app
      MARIADB_PASSWORD: family_app_local
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_local_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:4
    container_name: family-recipes-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:

